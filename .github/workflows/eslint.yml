name: ESLint on PR

on:
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm install
      - name: Run ESLint
        # Exit code determines success — any error fails the workflow.
        # Warnings stay visible in GitHub's check annotations without failing;
        # swap to `--max-warnings=0` if/when we want to enforce zero warnings too.
        run: npm run lint
