name: ESLint on PR

on:
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    # The final step posts a comment back on the PR; default GITHUB_TOKEN
    # permissions on pull_request events are read-only, which caused
    # "Resource not accessible by integration" failures even when lint
    # itself passed. Granting write on issues/pull-requests lets the
    # summary comment post.
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v3
      - name: Install ESLint Packages
        run: npm install
      - name: Run ESLint
        continue-on-error: false
        run: |
          out=$(echo "$(npx eslint --ext .js --ext .jsx --ext .mjs -f stylish client/src cypress server/src)")
          out="${out//'%'/'%25'}"
          out="${out//$'\n'/'%0A'}"
          out="${out//$'\r'/'%0D'}"
          out="${out//$'`'/"'"}"
          echo "::set-output name=OUT::$out"
        id: lint-script
      - uses: actions/github-script@v6
        with:
          script: |
            const bodyStr = `${{steps.lint-script.outputs.OUT}}` ? `\`\`\`${{steps.lint-script.outputs.OUT}}
            \`\`\`` : "No Errors Found";
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: bodyStr,
            });
