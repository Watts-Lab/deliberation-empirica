name: Playwright Component Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  playwright-component-tests:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # 20.x is the current stagebook floor (@tailwindcss/oxide requires
          # >= 20, @empirica/core requires >= 20.12). Using 18 silently
          # skipped the oxide platform binding via EBADENGINE and surfaced
          # as a "Cannot find native binding" at test start.
          node-version: "20"

      # `npm install --include=optional` (not `npm ci`) so the linux
      # runner picks up platform-specific optional bindings (e.g.
      # @tailwindcss/oxide-linux-x64-gnu) that aren't in a darwin-generated
      # lockfile. See https://github.com/npm/cli/issues/4828. This gives
      # us determinism for the pinned direct deps while still resolving
      # platform-specific optional deps for the current runner.
      - name: Install root dependencies
        run: npm install --include=optional

      - name: Install client dependencies
        run: cd client && npm install --include=optional

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run Playwright component tests (mocked)
        run: npx playwright test --config playwright/playwright.config.mjs "video-call/mocked" --project=${{ matrix.browser }} --workers=2

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 7
