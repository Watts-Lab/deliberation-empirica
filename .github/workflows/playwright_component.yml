name: Playwright Component Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  playwright-component-tests:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      # Remove package-lock.json before install so npm picks the correct
      # platform-specific optional deps (e.g. @tailwindcss/oxide-linux-x64-gnu).
      # See https://github.com/npm/cli/issues/4828 — npm's lockfile doesn't
      # capture all platform bindings, so a lock generated on darwin doesn't
      # resolve the linux binding on ubuntu-latest runners.
      - name: Install root dependencies
        run: rm -f package-lock.json && npm install

      - name: Install client dependencies
        run: cd client && rm -f package-lock.json && npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run Playwright component tests (mocked)
        run: npx playwright test --config playwright/playwright.config.mjs "video-call/mocked" --project=${{ matrix.browser }} --workers=2

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 7
