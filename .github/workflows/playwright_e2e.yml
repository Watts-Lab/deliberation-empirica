name: Playwright E2E Smoke

on:
  push:
    branches: [main]
  pull_request:

jobs:
  e2e-smoke:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Matches the Node 20 requirement from @tailwindcss/oxide and
          # @empirica/core; see playwright_component.yml for the fuller
          # rationale.
          node-version: "20"

      - name: Install Empirica CLI
        run: |
          curl -fsSL https://install.empirica.dev | sh
          echo "$HOME/.empirica/bin" >> "$GITHUB_PATH"

      # `npm install --include=optional` (not `npm ci`) so the linux
      # runner picks up platform-specific optional bindings that aren't
      # in a darwin-generated lockfile. See playwright_component.yml /
      # https://github.com/npm/cli/issues/4828.
      - name: Install root dependencies
        run: npm install --include=optional

      - name: Install client dependencies
        run: cd client && npm install --include=optional

      - name: Install server dependencies
        run: cd server && npm install --include=optional

      - name: Install Playwright browsers
        # Only chromium — smoke doesn't need cross-browser coverage.
        run: npx playwright install --with-deps chromium

      - name: Run e2e smoke
        run: npm run test:e2e

      - name: Upload test report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-e2e
          path: playwright-report-e2e/
          retention-days: 7
